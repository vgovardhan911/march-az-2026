    jobs:
    build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    -name: npm install - modules
    - run: npm install

   - name: angular build
    - run: npm run build --if-present

    -name: Angular e2e test
    run: npm test

    -name: Docker build image
    run: docker build -t gov/app:latest .
